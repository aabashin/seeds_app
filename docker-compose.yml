services:
  postgres:
    image: postgres:16-alpine
    container_name: seeds_app_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seeds_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seeds_network

  seeds_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seeds_app
    environment:
      - PHX_HOST=localhost
      - PHX_PORT=4000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB=seeds_dev
      - SECRET_KEY_BASE=your_secret_key_base_here_replace_in_production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seeds_network
    restart: unless-stopped

networks:
  seeds_network:
    driver: bridge

volumes:
  postgres_data:
